<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvZ 2: BloomFall</title>

    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hidden Background Music -->
    <audio id="bgMusic" loop>
        <source src="14-04. Modern Day (Mid Wave B).mp3" type="audio/mpeg">
    </audio>

    <!-- Navigation Header -->
    <header>
        <div class="brand-logo"></div>

        <div class="nav-container">
            <div class="nav-row">
                <span class="nav-link music-btn" id="musicToggle">🎵 Play Music</span>
                <a href="https://www.youtube.com/@PlantocalypseGamer" target="_blank" class="nav-link youtube-btn">🎥 YouTube</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="hero" id="heroSection">
        <div class="main-logo-box">
            <img src="BloomFall_Icon.png" alt="PvZ 2 BloomFall Icon">
        </div>

        <!-- Main Download Button -->
        <div class="cta-container">
            <a href="https://drive.google.com/drive/folders/1un5pnseyNeTR1pbvLVmxWXQ3aToaYDOa?usp=drive_link" target="_blank" class="main-download-btn">
                DOWNLOAD NOW
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="game-footer">
        <p>© 2026 BloomFall Project. Developed by PlantocalypseGamer.</p>
        <p style="font-size: 9px; margin-top: 2px; color: rgba(255,255,255,0.2);">
            Plants vs. Zombies is a trademark of EA / PopCap Games. This is a non-commercial fan modification.
        </p>
    </footer>

    <!-- Link to the external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
